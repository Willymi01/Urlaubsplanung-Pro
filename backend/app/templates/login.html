<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmeldung – Urlaubsplaner</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="logo-mark">U</div>
    <h1>Urlaubsplaner</h1>
    <p class="muted">Anmeldung für Abteilungsleiter</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="stack">
      <input type="hidden" name="csrf" value="{{ csrf_token }}">
      <label>Name
        <select name="display_name" required autofocus>
          <option value="">Bitte auswählen</option>
          {% for item in users %}<option value="{{ item.display_name }}">{{ item.display_name }}</option>{% endfor %}
        </select>
      </label>
      <label>PIN
        <input type="password" name="pin" inputmode="numeric" pattern="[0-9]{4,8}" maxlength="8" required autocomplete="current-password">
      </label>
      <button type="submit" class="primary">Anmelden</button>
    </form>
  </main>
</body>
</html>
